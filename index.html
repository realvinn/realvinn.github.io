<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinh Dibble Dabbing with HTML</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        .tabs {
            display: flex;
            cursor: pointer;
            background-color: #333;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            color: white;
            border-right: 1px solid #555;
        }

        .tab:last-child {
            border-right: none;
        }

        .tab:hover {
            background-color: #444;
        }

        .tab.active {
            background-color: #007BFF;
        }

        .content {
            padding: 20px;
            display: none;
        }

        .content.active {
            display: block;
        }

        .theme-toggle {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s, transform 0.2s;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .theme-toggle:active {
            transform: scale(0.9);
        }

        .dark-mode {
            background-color: #222;
            color: #ddd;
        }

        .light-mode {
            background-color: #f9f9f9;
            color: #333;
        }
    </style>
</head>
<body class="light-mode">
    <div class="theme-toggle" id="themeToggle" title="Toggle Theme">
        🌙
    </div>

    <div class="tabs">
        <div class="tab active" onclick="showTab('home')">Home</div>
        <div class="tab" onclick="showTab('about')">About</div>
        <div class="tab" onclick="showTab('contact')">Contact</div>
    </div>

    <div id="home" class="content active">
        <h1>Welcome to the Home Page</h1>
        <p>This is the home section of the website.</p>
    </div>
    <div id="about" class="content">
        <h1>About Me</h1>
        <p>Learn more about me here.</p>
    </div>
    <div id="contact" class="content">
        <h1>Contact with Me??</h1>
        <p>Contact me if for any inquiries.</p>
    </div>

    <script>
        function showTab(tabId) {
            const tabs = document.querySelectorAll('.tab');
            const contents = document.querySelectorAll('.content');

            tabs.forEach(tab => tab.classList.remove('active'));
            contents.forEach(content => content.classList.remove('active'));

            document.querySelector(`.tab[onclick="showTab('${tabId}')"]`).classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        themeToggle.addEventListener('click', () => {
            const isDarkMode = body.classList.contains('dark-mode');

            if (isDarkMode) {
                body.classList.replace('dark-mode', 'light-mode');
                themeToggle.textContent = '🌙';
            } else {
                body.classList.replace('light-mode', 'dark-mode');
                themeToggle.textContent = '💡';
            }
        });
    </script>
</body>
</html>
